<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELVET — Connecting…</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #f0efe8;
    font-family: 'DM Mono', monospace, system-ui;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 20px;
  }
  .logo {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.04em;
    background: linear-gradient(135deg, #1db954, #38bdf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .msg { font-size: 0.85rem; color: #6b6b7a; }
  .dot-wrap { display: flex; gap: 6px; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #1db954;
    animation: bounce 0.9s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%,80%,100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }
  .error { color: #f87171; font-size: 0.8rem; display: none; }
</style>
</head>
<body>
<div class="logo">VELVET</div>
<div class="dot-wrap"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
<div class="msg" id="msg">Completing sign-in…</div>
<div class="error" id="err"></div>
<script>
  (function() {
    const params = new URLSearchParams(window.location.search);
    const code   = params.get('code');
    const state  = params.get('state');
    const error  = params.get('error');

    function done(data) {
      // Send result back to opener
      if (window.opener) {
        window.opener.postMessage({ type: 'spotify_callback', ...data }, '*');
        document.getElementById('msg').textContent = 'Done! You can close this window.';
        setTimeout(() => window.close(), 800);
      } else {
        // No opener — redirect back with params in hash for same-page fallback
        document.getElementById('msg').textContent = 'Redirecting…';
        const base = document.referrer || '/';
        window.location.href = base + '?code=' + encodeURIComponent(data.code || '')
          + '&state=' + encodeURIComponent(data.state || '')
          + (data.error ? '&error=' + data.error : '');
      }
    }

    if (error) {
      document.getElementById('err').style.display = 'block';
      document.getElementById('err').textContent = 'Spotify error: ' + error;
      done({ error });
      return;
    }

    if (!code) {
      document.getElementById('err').style.display = 'block';
      document.getElementById('err').textContent = 'No authorization code received.';
      done({ error: 'no_code' });
      return;
    }

    done({ code, state });
  })();
</script>
</body>
</html>
